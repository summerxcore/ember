<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

/* ─── Config (stored in URL hash as base64 JSON) ─── */
function getConfig() {
  try {
    var h = window.location.hash.replace('#', '');
    if (!h) return null;
    return JSON.parse(atob(h));
  } catch(e) { return null; }
}

function setConfig(url, key) {
  window.location.hash = btoa(JSON.stringify({ url: url, key: key }));
}

function supabaseHeaders(cfg) {
  return {
    'Content-Type': 'application/json',
    'apikey': cfg.key,
    'Authorization': 'Bearer ' + cfg.key

}

/* ─── API via Supabase REST ─── */
function api(path) {
  var cfg = getConfig();
  if (!cfg) return Promise.reject(new Error('No config'));
  var base = cfg.url.replace(/\/$/, '') + '/rest/v1';
  var headers = supabaseHeaders(cfg);

  if (path === '' || path === '/') {
    return fetch(base + '/ember_entries?select=*,ember_annotations(*)&order=entry_date.desc', { headers: headers })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!Array.isArray(data)) throw new Error(JSON.stringify(data));
        return data.map(function(e) {

          return Object.assign({}, e, {
            annotations: anns,

  if (path.indexOf('/entry?id=') === 0) {
    var id = path.split('=')[1];
    return fetch(base + '/ember_entries?id=eq.' + id + '&select=*,ember_annotations(*)', { headers: headers })
      .then(function(r) { return r.json(); })
      .then(function(data) {

        var e = data[0];
        e.annotations = e.ember_annotations || [];

  }

  if (path.indexOf('/annotations?entry_id=') === 0) {
    var eid = path.split('=')[1];
    return fetch(base + '/ember_annotations?entry_id=eq.' + eid + '&order=created_at', { headers: headers })
      .then(function(r) { return r.json(); });
  }

  return Promise.reject(new Error('Unknown path: ' + path));
}

function apiDelete(path) {
  var cfg = getConfig();
  if (!cfg) return Promise.reject(new Error('No config'));
  var base = cfg.url.replace(/\/$/, '') + '/rest/v1';
  var headers = supabaseHeaders(cfg);
  return fetch(base + path, { method: 'DELETE', headers: headers })
    .then(function(r) { if (!r.ok) throw new Error(r.status); });
}

function apiPost(path, body) {

  var base = cfg.url.replace(/\/$/, '') + '/rest/v1';
  var headers = Object.assign({}, supabaseHeaders(cfg), { 'Prefer': 'return=representation' });

      headers: headers,

      .then(function(data) { return Array.isArray(data) ? data[0] : data; });
  }

  return Promise.reject(new Error('Unknown path: ' + path));
}

/* ─── Entry Body with highlights ─── */

    React.createElement('div', { style: { fontSize: '13px', color: '#3d2e1f', lineHeight: 1.7 } }, a.note || a.text),

/* ─── Entry View ─── */
function EntryView(props) {
  var entry = props.entry, showBack = props.showBack, onBack = props.onBack;
  var _q = useState(null); var quote = _q[0]; var setQuote = _q[1];
  var _qs = useState(-1); var quoteStart = _qs[0]; var setQuoteStart = _qs[1];

    React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' } },

function App() {

  var _loading = useState(false); var loading = _loading[0]; var setLoading = _loading[1];
  var _url = useState(''); var connectUrl = _url[0]; var setConnectUrl = _url[1];
  var _key = useState(''); var connectKey = _key[0]; var setConnectKey = _key[1];

  var _connecting = useState(false); var connecting = _connecting[0]; var setConnecting = _connecting[1];

    }).catch(function(e) { console.error(e); setLoading(false); });
  }

  useEffect(function() {

        setDetailEntry(full); setDetailFrom(from); setPage('detail');
      }).catch(function() {
        setDetailEntry(entry); setDetailFrom(from); setPage('detail');

      setDetailEntry(entry); setDetailFrom(from); setPage('detail');

  }

  function handleConnect() {
    var url = connectUrl.trim().replace(/\/$/, '');
    var key = connectKey.trim();
    if (!url || !key) { setErrMsg('Please fill in both fields.'); return; }
    setErrMsg(''); setConnecting(true);
    // Test connection by fetching entries
    fetch(url + '/rest/v1/ember_entries?limit=1', {
      headers: { 'apikey': key, 'Authorization': 'Bearer ' + key }
    }).then(function(r) {
      setConnecting(false);
      if (r.ok || r.status === 200) {
        setConfig(url, key);
        setPage('home');
      } else {
        r.text().then(function(t) { setErrMsg('Failed (' + r.status + '): ' + t.slice(0, 120)); });
      }

        React.createElement('div', { className: 'label', style: { marginBottom: '24px' } }, 'CONNECT YOUR DIARY'),
        React.createElement('div', { style: { width: '100%', maxWidth: '360px' } },

          React.createElement('input', { className: 'input', value: connectUrl, onChange: function(e) { setConnectUrl(e.target.value); }, placeholder: 'https://xxxxxx.supabase.co', style: { marginBottom: '12px' } }),
          React.createElement('div', { className: 'label', style: { marginBottom: '6px', marginTop: '4px' } }, 'ANON KEY'),
          React.createElement('input', { className: 'input', value: connectKey, onChange: function(e) { setConnectKey(e.target.value); }, placeholder: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...', style: { marginBottom: '16px' } }),
          React.createElement('button', { onClick: handleConnect, disabled: connecting, className: 'btn-dk', style: { width: '100%', marginBottom: '0' } }, connecting ? 'CONNECTING…' : 'CONNECT'),
          errMsg && React.createElement('div', { className: 'err-box' }, errMsg),
          React.createElement('div', { style: { marginTop: '16px', fontSize: '10px', color: '#a89478', lineHeight: 1.8, textAlign: 'center' } },

  /* ── DETAIL ── */

  /* ── MAIN ── */

    React.createElement('div', { className: 'dot-bg' }),
    React.createElement('div', { style: { position: 'relative', zIndex: 1 } },
      React.createElement(Header, { page: page, setPage: setPage, setDetailFrom: setDetailFrom }),
      loading && React.createElement('div', { style: { textAlign: 'center', color: '#a89478', fontSize: '11px', padding: '40px', letterSpacing: '3px' } }, 'LOADING…'),
